<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="index.css">
    <title></title>
</head>
<body>
    <div class="container">
        <div class="rounds-left">
            Rounds until long break: <span id="rounds-count">4</span>
        </div>
        <div class="timer-container">
            <button id="pomodorobtn">Pomodoro</button>
            <button id="shortbrkbtn">Short Break</button>
            <button id="longbrkbtn">Long Break</button>
        </div>
        <div class="pomdoro-count"></div>
        <div class="progressbar">
            <div class="progressbar-inner">
                <h2 class="progressbar-number">25:00</h2>
            </div>
        </div>
        <div class="function-buttons">
            <button id="startbtn">Start</button>
            <button id="pausebtn">Pause</button>
            <button id="resetbtn">Reset</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
